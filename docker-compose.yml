services:
  postgres:
    image: postgres:16-alpine
    container_name: caseprac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: caseprac
      POSTGRES_PASSWORD: caseprac_password
      POSTGRES_DB: caseprac_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caseprac -d caseprac_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: caseprac-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: caseprac-minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'minio server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-06-34Z
    container_name: caseprac-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/caseprac-artifacts;
      /usr/bin/mc anonymous set download myminio/caseprac-artifacts;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
